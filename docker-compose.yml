# Multi-service Docker Compose for Raspberry Pi
# This file contains all services for the Pi setup

services:
  # yt-dlp Web Interface Service
  yt-dlp:
    build:
      context: ./services/yt-dlp
      dockerfile: Dockerfile
    container_name: yt-dlp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Video downloads
      - /mnt/storage/media/downloads:/downloads
      # Audio downloads (separated)
      - /mnt/storage/media/downloads/audio:/downloads/audio
      # Logs and state
      - /mnt/storage/media/downloads/.logs:/app/logs
    environment:
      # Download directories
      - DOWNLOAD_DIR=/downloads
      - AUDIO_DIR=/downloads/audio
      - LOG_FILE=/app/logs/yt-dlp-web.log
      # Server configuration
      - PORT=8080
      # Optional: Set timezone
      - TZ=America/Toronto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Optional: Resource limits for Raspberry Pi
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - cys-service

  announcements:
    build:
      context: ./services/announcements
      dockerfile: Dockerfile
    container_name: announcements
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8091"
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - PORT=8091
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cys-service

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: composeyourself
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}

  # Immich Server
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          # Number of CPU threads
          cpus: '2.00'
          # Gigabytes of memory
          memory: '4G'

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          # Number of CPU threads
          cpus: '2.00'
          # Gigabytes of memory
          memory: '4G'


  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          # Number of CPU threads
          cpus: '2.00'
          # Gigabytes of memory
          memory: '4G'


  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          # Number of CPU threads
          cpus: '2.00'
          # Gigabytes of memory
          memory: '4G'

  # Open WebUI
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./services/agenticui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
    networks:
      - cys-service


  # Future services can be added here:
  # Example structure for additional services:
  #
  # jellyfin:
  #   image: jellyfin/jellyfin:latest
  #   container_name: jellyfin
  #   restart: unless-stopped
  #   ports:
  #     - "8096:8096"
  #   volumes:
  #     - ./services/jellyfin/config:/config
  #     - /mnt/storage/media:/media
  #   networks:
  #     - cys-service
  #
  # plex:
  #   image: plexinc/pms-docker:latest
  #   container_name: plex
  #   restart: unless-stopped
  #   ports:
  #     - "32400:32400"
  #   volumes:
  #     - ./services/plex/config:/config
  #     - /mnt/storage/media:/media
  #   networks:
  #     - cys-service

# Shared network for all services
networks:
  cys-service:
    driver: bridge

volumes:
  model-cache:
