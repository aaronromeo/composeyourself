# Multi-service Docker Compose - Base Configuration
# This file contains services shared across all hosts
# Use with docker-compose.<host>.yml for host-specific deployments
#
# Examples:
#   docker compose -f docker-compose.yml -f docker-compose.rocketman.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.sweetpaintedlady.yml up -d

services:
  # Tailscale - VPN mesh network (shared across all hosts)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${TAILSCALE_HOSTNAME:-composeyourself}
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    # Tailscale provides inter-host connectivity
    # All services can communicate via Tailscale IPs/hostnames

# Note: No networks defined here - each host compose file defines its own
# or uses network_mode: host for tailscale

# Note: No volumes defined here - host-specific compose files define volumes
