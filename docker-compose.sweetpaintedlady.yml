# Docker Compose for Sweetpaintedlady
#
# Services:
#   - openwebui: AI chat interface with OpenRouter
#   - caddy: Reverse proxy with auto HTTPS
#   - authelia: MFA authentication server
#
# Access:
#   https://${DOMAIN}
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.sweetpaintedlady.yml up -d

services:
  # Open WebUI - AI Chat Interface
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: openwebui
    restart: unless-stopped
    # No direct port exposure - accessed via Caddy reverse proxy
    # Port 8080 exposed only to internal network
    expose:
      - "8080"
    volumes:
      - ./services/agenticui:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - ENV=production
      # OIDC Configuration with Authelia
      - WEBUI_URL=https://${SUBDOMAIN}.${DOMAIN}
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_CLIENT_ID=open-webui
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=https://auth.${DOMAIN}/.well-known/openid-configuration
      - OAUTH_SCOPES=openid email profile groups
      - ENABLE_OAUTH_ROLE_MANAGEMENT=true
      - OAUTH_PROVIDER_NAME=Authelia
      - ENABLE_PASSWORD_AUTH=false
      - ENABLE_SIGNUP=false
      - DEFAULT_MODELS=${OPENWEBUI_DEFAULT_MODELS:-}
      - DEFAULT_USER_ROLE=user
      - OAUTH_ALLOWED_ROLES=openwebui,openwebui-admin
      - OAUTH_ADMIN_ROLES=openwebui-admin
      - OAUTH_ROLES_CLAIM=groups
      - OAUTH_CODE_CHALLENGE_METHOD=S256
    networks:
      - cys-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Caddy - Reverse Proxy with Auto HTTPS
  caddy:
    image: caddy:2.11.1
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SUBDOMAIN=${SUBDOMAIN}
      - DOMAIN=${DOMAIN}
    networks:
      - cys-service
    depends_on:
      - authelia
      - openwebui
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Authelia - MFA Authentication Server
  authelia:
    image: authelia/authelia:4.39.15
    container_name: authelia
    restart: unless-stopped
    expose:
      - "9091"
    volumes:
      - ./services/authelia/configuration.yml:/config/configuration.yml:ro
      - ./services/authelia/users_database.yml:/config/users_database.yml:ro
      - ./services/authelia/keys:/config/keys:ro
      - authelia_data:/data
    environment:
      - X_AUTHELIA_CONFIG_FILTERS=template
      - TZ=America/Toronto
      # Authelia configuration uses native env var mapping (AUTHELIA_ prefix)
      # See: https://www.authelia.com/configuration/methods/environment/
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_NOTIFIER_SMTP_ADDRESS=${AUTHELIA_SMTP_HOST}:${AUTHELIA_SMTP_PORT}
      - AUTHELIA_NOTIFIER_SMTP_USERNAME=${AUTHELIA_SMTP_USERNAME}
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD=${AUTHELIA_SMTP_PASSWORD}
      - AUTHELIA_NOTIFIER_SMTP_SENDER=${AUTHELIA_SMTP_SENDER}
      # Note: OIDC secrets are generated by generate_config.sh if not present:
      # - OPENWEBUI_OIDC_SECRET (in .env)
      # - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET (in .env)
    networks:
      - cys-service
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Shared network for all services
networks:
  cys-service:
    driver: bridge

volumes:
  caddy_data:
    # Persist TLS certificates
  caddy_config:
    # Persist Caddy configuration
  authelia_data:
    # Persist Authelia database and state
